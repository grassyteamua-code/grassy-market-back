version: '3.9'                                         # Вказує версію синтаксису Docker Compose. 3.9

services:                                              # Секція, де описуються всі контейнери, які будуть запущені.
  postgres:                                            # Контейнер для бази даних "Grassy Agromarketplace" на основі PostgreSQL.
    image: postgres:15                                 # Використовує офіційний образ PostgreSQL версії 15, який містить всі необхідні компоненти для роботи бази даних.
    container_name: postgres_container                 # Ім’я контейнера для зручності управління та ідентифікації.
    restart: always                                    # Автоматичний перезапуск контейнера у випадку збою або перезавантаження системи.
    environment:                                       # Змінні середовища для налаштування PostgreSQL.
      POSTGRES_USER: grassy_teammate_001               # Ім’я користувача для доступу до бази даних.
      POSTGRES_PASSWORD: postgres                      # Пароль для користувача. В реальному проекті його слід зберігати в безпечному місці. Найкращий місцем для цього можеуть бути змінних серидоваща на хості.         
      POSTGRES_DB: grassy_agromarketplace_database     # Назва бази даних, яка буде створена при запуску контейнера.
    ports:                                             # Порти для доступу до бази даних ззовні контейнера.
      - "5432:5432"                                    # Перекидання порта з контейнера на локальну машину: зовнішній порт 5432 (на хості) буде перенаправлений на порт 5432 всередині контейнера, що дозволяє підключатися до бази даних ззовні.
    volumes:                                           # Зберігання даних бази даних у локальній директорії, щоб вони не зникали після перезапуску контейнера.     
      - postgres_data:/var/lib/postgresql/data         # Іменований том "postgres_data" буде примонтований до каталогу "/var/lib/postgresql/data" всередині контейнера, де PostgreSQL зберігає свої дані.
    networks:                                          # Підключення контейнера до мережі для взаємодії з іншими контейнерами. Підключає до мережі backend для взаємодії з іншими сервісами, які можуть бути додані пізніше.
      - grassy_agromarketplace                         # Створює окрему мережу для взаємодії контейнерів. Контейнер буде підключений до мережі "grassy_agromarketplace", що дозволить йому спілкуватися з іншими контейнерами, які також підключені до цієї мережі. Використовується драйвер bridge. 

  pgadmin:                                             # Контейнер для pgAdmin 4, інструменту для управління PostgreSQL через веб-інтерфейс.
    image: dpage/pgadmin4                              # dpage/pgadmin4 — офіційний образ pgAdmin 4. Використовує офіційний образ pgAdmin 4, який містить всі необхідні компоненти для роботи цього інструменту.
    container_name: pgadmin_container                  # Ім’я контейнера для зручності управління та ідентифікації.    
    restart: always                                    # Автоматичний перезапуск контейнера у випадку збою або перезавантажения системы.
    environment:                                       # Змінні середовища для налаштування pgAdmin.
      PGADMIN_DEFAULT_EMAIL: admin@admin.com           # Логін адміністратора для доступу до pgAdmin. В реальному проекті його слід зберігати в безпечному місці. Найкращий місцем для цього можеют бути змінних серидоваща на хості.
      PGADMIN_DEFAULT_PASSWORD: admin                  # Пароль адміністратора для доступу до pgAdmin. В реальному проекті його слід зберігати в безпечному місці. Найкращий місцем для цього может быть змінних серидоваща на хості.
    ports:                                             # Порти для доступу к pgAdmin через веб-браузер.
      - "5050:80"                                      # Перекидання порта з контейнера на локальную машину: зовнішній порт 5050 (на хості) будет перенаправлений на порт 80 в середині контейнера, що дозволиться отримати доступ до pgAdmin за адресою: http://localhost:5050.
    depends_on:                                        # Гарантує, що pgAdmin стартує після PostgreSQL. Це важно для того, щоб pgAdmin міг підключитися до бази даних після свого запуску.
      - postgres
    networks:                                          # Підключення контейнера до мережі для взаємодії з іншими контейнерами. Підключає до тієї ж мережі backend для взаємодії з PostgreSQL.
      - grassy_agromarketplace                         
volumes:                                               # Зберігання даних бази даних у локальній директорії, щоб вони не зникали після перезапуску контейнера.
  postgres_data:                                       # Іменований том для збереження даних PostgreSQL, що дозволяє зберігати дані навіть після перезапуску контейнера.

networks:                                              # Секція для визначення мереж, які використовуються контейнерами.
  backend:                                             # Створює окрему мережу для взаємодії контейнерів. Контейнер буде підключений до мережі "backend", що дозволить йому спілкуватися з іншими контейнерами, які також підключені до цієї мережі. Використовується драйвер bridge.
    driver: bridge                                     # Використовується драйвер bridge для створення ізольованої мережі, яка дозволяє контейнерам спілкуватися між собою, але не з зовнішнім світом без явного пробросу портів.